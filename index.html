<!DOCTYPE html>
<html>
<head>
  <title>Record your Contest Data</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    label { display: block; margin-top: 20px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    .error { color: red; font-size: 13px; margin-top: 10px; }
    .success { color: green; font-size: 13px; margin-top: 10px; }
    button { margin-top: 30px; padding: 12px 30px; background: #0066cc; color: white; border: none; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>

  <h2>Record your Contest Data</h2>
  <p style="color:red;">For registered users only. If you have not registered yet, <a href="#">register here first</a>.</p>

  <label>Registered Email *</label>
  <input type="email" id="emailField" placeholder="example@example.com">

  <div id="statusMsg"></div>

  <button onclick="submitForm()">Submit</button>

  <script>
    function submitForm() {
      var email = document.getElementById("emailField").value.trim();
      var statusMsg = document.getElementById("statusMsg");

      if (!email) {
        statusMsg.className = "error";
        statusMsg.textContent = "Please enter your email.";
        return;
      }

      statusMsg.className = "";
      statusMsg.textContent = "Validating...";

      fetch("https://script.google.com/macros/s/AKfycbzwnBjHBuQJdmkRLM2z7wBFsC6c1JELlqHpc78irHomEKCx86YBczZaSD5nVxUXMJb6Gg/exec?email=" + encodeURIComponent(email))
        .then(r => r.json())
        .then(data => {
          if (!data.valid) {
            statusMsg.className = "error";
            statusMsg.textContent = "❌ This email is not registered. Please register first.";
          } else {
            statusMsg.className = "success";
            statusMsg.textContent = "✅ Email verified! Redirecting to form...";
            // Redirect to your JotForm after validation
            setTimeout(function() {
              window.location.href = "https://form.jotform.com/260656839290063";
            }, 1500);
          }
        })
        .catch(() => {
          statusMsg.className = "error";
          statusMsg.textContent = "Validation error. Please try again.";
        });
    }
  </script>

</body>
</html>
